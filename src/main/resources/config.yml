cultivar:
  disabled-worlds: []

  cannabis:
    enabled: true
    stage-minutes: 20
    prune-window-minutes: 40
    water-expiry-minutes: 45
    dying-window-minutes: 20
    midday-sun-stress: true
    overcrowding-radius: 1

  tobacco:
    enabled: true
    stage-minutes: 25
    strip-window-minutes: 35
    water-expiry-minutes: 45
    heat-bonus-radius: 4
    heat-bonus-percent: 20
    dry-seconds: 120

  tea:
    enabled: true
    stage-minutes: 15
    mist-interval-minutes: 30
    water-expiry-minutes: 60
    water-source-bonus-radius: 3
    water-source-bonus-percent: 15

  tea-brewing:
    brew-seconds: 60
    leaves-required: 2
    max-cups-per-brew: 4
    variants:
      green:
        effects: [REGENERATION:0:15, SATURATION:0:10]
        message: "§aRefreshing"
      black:
        effects: [SPEED:0:30, HASTE:0:20]
        message: "§7Bold and rich"
      herbal:
        effects: [NIGHT_VISION:0:60, SLOW_FALLING:0:30]
        message: "§5Earthy and calm"

  tea-drying:
    drying-seconds: 60

  smoking:
    pipe-uses: 10
    pipe-timeout-minutes: 5
    cooldown-seconds: 120
    cannabis-effects:
      [SLOWNESS:1:40, HUNGER:0:20, NIGHT_VISION:0:60, NAUSEA:0:3]
    tobacco-effects: [SPEED:0:30, SATURATION:0:10]

  notifications:
    proximity-radius: 4
    proximity-cooldown-seconds: 180

sounds:
  enabled: true
  volume: 0.5

animation:
  speed-ticks: 1

recipes:
  cannabis-seed: true
  tobacco-seed: true
  tea-seed: true
  compost: true
  blank-pipe: true
  teapot: true
  harvest-basket: false
  trim-compost: true

reputation:
  thresholds:
    apprentice: 0
    cultivator: 50
    master-grower: 200
    botanist: 500
  scores:
    harvest: 2
    prune: 1
    strip: 1
    mist: 1
    harvest-other-strain: 3
    zero-stress-harvest: 3
    cross-breed: 10
    perfect-steep: 2

blends:
  spliff-duration-multiplier: 0.7
  herbal-night-vision-seconds: 120
  spiced-regen-amplifier: 1

loot:
  inject-dungeon: true
  inject-village: true
  inject-wandering-trader: true
